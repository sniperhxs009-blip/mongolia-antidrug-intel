services:
  - type: web
    name: mongolia-antidrug-intel
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: intel-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:////var/data/intel.db
      - key: CRAWL_INTERVAL
        value: every_12h
      - key: CRAWL_REQUEST_DELAY_SEC
        value: "0.3"
      - key: CRAWL_DELAY_JITTER_SEC
        value: "0.5"
      - key: ENABLE_TRANSLATION
        value: "true"
      - key: ENABLE_SEARCH_FEEDS
        value: "true"
      - key: CRAWL_MAX_PAGES_CORE
        value: "8"
      - key: CRAWL_MAX_DEPTH
        value: "2"
      - key: ENABLE_OFFICIAL_CRAWL
        value: "true"
      - key: ENABLE_CORE_OFFICIAL_IN_NEWS
        value: "true"
      - key: CRAWL_LOOSE_FILTER
        value: "false"
      - key: NEWS_WHEN
        value: "90d"
      - key: FULL_WHEN
        value: "30d"
      - key: FORUM_WHEN
        value: "30d"
      - key: ENABLE_FORUM_SEARCH
        value: "true"
      - key: AUTH_ENABLED
        value: "true"
      - key: REQUIRE_MANUAL_DEPLOY
        value: "false"
      - key: CRAWL_SSL_VERIFY
        value: "false"
      - key: CRAWL_MAX_PAGES_PER_SOURCE
        value: "60"
      - key: CRAWL_MAX_AGE_DAYS
        value: "30"
      - key: TIMEZONE
        value: Asia/Ulaanbaatar
      - key: ENABLE_ALERT_EMAIL
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USE_SSL
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: EMAIL_DAILY_BRIEF_HOUR
        value: "8"
      - key: EMAIL_DAILY_BRIEF_MINUTE
        value: "0"
      - key: AUTH_ADMIN_PASSWORD
        sync: false
      - key: AUTH_ANALYST_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
