<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>研判报告 - {{ report.title }}</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    /* 强制报告页全文白色，覆盖历史内联深色样式 */
    .report, .report * { color: #ffffff !important; }
    .report a, .report a:hover { color: #7dd3fc !important; }
  </style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="mark">禁</div>
      <div>
        <h1>情报研判报告</h1>
        <p class="sub">仅基于蒙古国官方体系与公开媒体资讯自动生成</p>
      </div>
    </div>
    <nav><a href="/">返回指挥台</a></nav>
  </header>
  <main class="wrap">
    <article class="panel report">
      {{ report.content_html | safe }}
    </article>
  </main>
</div>
</body>
</html>
