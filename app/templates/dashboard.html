<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<title>{{app_name}}</title>
</head>
<body>
<h1>{{app_name}} 控制台</h1>
<div class="card">
<h3>实时统计</h3>
<p>情报总数：{{intel_count}}</p>
<p>告警数量：{{alert_count}}</p>
<p>数据源：{{source_count}}</p>
<p>报告：{{report_count}}</p>
<a href="/api/crawl/run" class="btn">手动采集</a>
<a href="/sources" class="btn">数据源管理</a>
</div>
<div class="card">
<h3>最新情报列表</h3>
{% for item in latest_items[:10] %}
<div>
<span {% if item.is_alert %}class="alert-text"{% endif %}>{{item.title_zh}}</span>
</div>
{% endfor %}
</div>
</body>
